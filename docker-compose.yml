services:
  webstudio-builder:
    build: .
    expose:
      - "3000"
    volumes:
      - sites-data:/app/sites
    environment:
      - SITES_DIR=/app/sites
      - DEPLOY_BASE_URL=https://example.com
    networks:
      - website-builder-network

  nginx-static:
    image: nginx:alpine
    expose:
      - "80"
    volumes:
      - sites-data:/usr/share/nginx/html:ro
      - ./nginx/static.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - website-builder-network

volumes:
  sites-data:

networks:
  website-builder-network:
    driver: bridge
    external: true
